    <style>
        body {
            font-family: "Public Sans", sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
        }
        :root {
            --ir-blue: #003399;
            --ir-gold: #FFD700;
            --sidebar-width: 288px;
            --sidebar-min-width: 80px;
        }

        .sidebar {
            background-color: var(--ir-blue);
            width: var(--sidebar-width);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Minimized State */
        .sidebar.minimized { width: var(--sidebar-min-width); }
        .sidebar.minimized .nav-text, 
        .sidebar.minimized .sidebar-header-text,
        .sidebar.minimized .user-details,
        .sidebar.minimized .section-label { display: none; }
        
        .sidebar.minimized .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
        .sidebar.minimized .sidebar-header { justify-content: center; padding: 1.5rem 0; }

        .nav-item {
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--ir-gold);
            color: white;
        }

        .module-btn {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .module-btn:hover {
            transform: scale(1.05);
            border-color: var(--ir-blue);
            box-shadow: 0 15px 30px -10px rgba(0, 51, 153, 0.15);
        }

        /* Header Logo - Only shows when sidebar is minimized */
        #header-logo {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .sidebar.minimized ~ .main-content #header-logo { display: flex; }
body { font-family: "Public Sans", sans-serif; }
        .sidebar { width: 288px; transition: width 0.3s; }
        .sidebar.minimized { width: 80px; }
        .sidebar.minimized .nav-text, .sidebar.minimized .sidebar-header-text { display: none; }
        .active-tab { border-left: 4px solid #FFD700; background: rgba(255,255,255,0.1); }
        .alert-row { background-color: #fee2e2 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside id="sidebar" class="sidebar flex flex-col flex-shrink-0 z-20">

        </nav>

        <div class="p-4 bg-black/10 border-t border-blue-900/50">

                    <p class="text-xs font-bold text-white truncate">ABC abc</p>
                    <p class="text-[9px] text-blue-300 uppercase">USER</p>
                </div>
                <i class="fa-solid fa-right-from-bracket text-blue-400 cursor-pointer hover:text-red-400"></i>
            </div>
        </div>
    </aside>

    <div class="main-content flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8 z-10">
            <div class="flex items-center space-x-4">
                <div id="header-logo" class="items-center space-x-3 mr-4">
                    <i class="fa-solid fa-train-subway text-[#003399] text-xl"></i>
                    <span class="font-black text-slate-800 tracking-tight">NOCC ROOT</span>
                </div>
                <h1 class="text-lg font-black text-slate-800 uppercase tracking-tight hidden md:block">Digital Document</h1>
                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest">
                    Live
                </span>
            </div>
            
            <div class="flex items-center space-x-6">
                
                <div class="text-right font-mono">
                    <div id="header-clock" class="text-slate-800 font-bold text-sm leading-none">00:00:00</div>
                    <div id="header-date" class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">24 FEB 2026</div>
                </div>
            </div>
        </header>

       <!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-8">
            <div class="mb-6 flex gap-4">
                <input type="text" id="docSearch" onkeyup="filterDocs()" placeholder="Search documents..." class="px-4 py-2 rounded-lg border w-64 text-sm">
                <button onclick="filterCategory('All')" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-bold">All</button>
                <input type="file" id="pdfInput" accept="application/pdf" onchange="handleFileSelect(event)" class="hidden">

            </div>

            <div id="docGrid" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                
                </div>
        </main>
    </div>

    <div id="docModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-1/2 rounded-2xl p-8">
            <h2 id="modalTitle" class="text-xl font-bold mb-4">Document Title</h2>
            <div class="h-64 bg-gray-100 flex items-center justify-center border-2 border-dashed rounded-lg mb-4">
                Preview Pane
            </div>
            <button onclick="closeModal()" class="bg-red-600 text-white px-6 py-2 rounded">Close</button>
        </div>
    </div>

    <script>
        const docs = [
            { name: "Q4_Financial_Report.pdf", cat: "Financial" },
            { name: "Operations_Manual.pdf", cat: "Operations" },
            { name: "Compliance_Checklist.pdf", cat: "Operations" }
        ];

        function renderDocs(data) {
            const grid = document.getElementById('docGrid');
            grid.innerHTML = data.map(doc => `
                <div onclick="openModal('${doc.name}')" class="p-4 bg-white rounded-xl shadow-sm border hover:border-red-500 cursor-pointer">
                    <div class="h-32 bg-gray-100 mb-2 flex items-center justify-center"><i class="fa-solid fa-file-pdf text-3xl text-red-400"></i></div>
                    <h3 class="font-bold text-sm truncate">${doc.name}</h3>
                </div>
            `).join('');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('minimized'); }
        function openModal(name) { document.getElementById('modalTitle').innerText = name; document.getElementById('docModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('docModal').classList.add('hidden'); }
        function filterDocs() {
            const q = document.getElementById('docSearch').value.toLowerCase();
            renderDocs(docs.filter(d => d.name.toLowerCase().includes(q)));
        }

        function updateClock() { document.getElementById('header-clock').textContent = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000);

        renderDocs(docs);
    </script>
</div>

    <script>
        
        // Sidebar Toggle Logic
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('minimized');
            
            if (sidebar.classList.contains('minimized')) {
                icon.classList.replace('fa-chevron-left', 'fa-chevron-right');
            } else {
                icon.classList.replace('fa-chevron-right', 'fa-chevron-left');
            }
        }

        // Live Clock Logic
        function updateClock() {
            const now = new Date();
            document.getElementById('header-clock').textContent = now.toLocaleTimeString('en-GB');
            document.getElementById('header-date').textContent = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();
        </script>
