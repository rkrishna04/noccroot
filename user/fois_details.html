<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOIS | Comprehensive Inventory Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%); color: #1e293b; min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        
        .filter-dropdown { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            z-index: 50; 
            min-width: 220px; 
            max-height: 350px;
            overflow-y: auto;
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            border: 1px solid #e2e8f0; 
            padding: 12px; 
            cursor: default;
        }
        .filter-dropdown.active { display: block; }
        th { position: relative; cursor: pointer; transition: background 0.2s; }
        th:hover { background: #f8fafc; }
        .checkbox-item:hover { background: #f1f5f9; }
        .filter-icon { font-size: 0.7rem; margin-left: 4px; opacity: 0.4; }
        
        input[type="date"] {
            font-size: 10px;
            padding: 4px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            width: 100%;
            margin-top: 4px;
        }
    </style>
</head>
<body class="p-4 md:p-8" onclick="closeAllFilters()">

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center space-x-4">
            <a href="user.html" class="glass-panel p-3 rounded-xl hover:bg-black/5 transition text-indigo-600">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-2xl font-bold tracking-wider uppercase text-slate-900">FOIS <span class="text-indigo-600 text-sm font-light">Details Management </span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em]">Advanced Life-Cycle & Date Filtering</p>
            </div>
        </div>
        <div class="flex items-center bg-white border border-slate-200 rounded-xl px-4 py-2 shadow-sm">
            <i class="fa-solid fa-magnifying-glass text-slate-400 mr-3"></i>
            <input type="text" id="globalSearch" onkeyup="applyAllFilters()" placeholder="Global search..." class="outline-none text-sm w-64">
        </div>
    </header>

    <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl border border-black/5">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="bg-indigo-50 text-indigo-700 uppercase text-[10px] font-black tracking-widest">
                        <th class="p-4 border-b border-black/5 text-center">Sr.</th>
                        <th class="p-4 border-b border-black/5" onclick="toggleFilter(event, 'zone')">Zone <i class="fa-solid fa-filter filter-icon"></i><div id="filter-zone" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5" onclick="toggleFilter(event, 'div')">Division <i class="fa-solid fa-filter filter-icon"></i><div id="filter-div" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5" onclick="toggleFilter(event, 'cat')">Category <i class="fa-solid fa-filter filter-icon"></i><div id="filter-cat" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5" onclick="toggleFilter(event, 'tier')">Tier <i class="fa-solid fa-filter filter-icon"></i><div id="filter-tier" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5 text-indigo-900 bg-indigo-100/50">Node Name</th>
                        <th class="p-4 border-b border-black/5" onclick="toggleFilter(event, 'profile')">Profile <i class="fa-solid fa-filter filter-icon"></i><div id="filter-profile" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5" onclick="toggleFilter(event, 'install')">Install <i class="fa-solid fa-calendar-days filter-icon"></i><div id="filter-install" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5 text-rose-600" onclick="toggleFilter(event, 'eol')">EOL <i class="fa-solid fa-calendar-days filter-icon"></i><div id="filter-eol" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                        <th class="p-4 border-b border-black/5 text-center" onclick="toggleFilter(event, 'age')">Age <i class="fa-solid fa-filter filter-icon"></i><div id="filter-age" class="filter-dropdown" onclick="event.stopPropagation()"></div></th>
                    </tr>
                </thead>
                <tbody class="text-[11px] font-medium text-slate-600 divide-y divide-black/5" id="foisTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const fullExcelData = [
            { sr: 1, zone: "WR", div: "BRC", cat: "ROUTER", tier: "Tier 3", node: "PRTN-R1", profile: "HP MSR3044", install: "2019-10-10", eol: "2027-09-10", age: "8" },
            { sr: 2, zone: "WR", div: "BRC", cat: "ROUTER", tier: "Tier 3", node: "PRTN-R2", profile: "HP MSR3044", install: "2019-10-10", eol: "2027-09-10", age: "8" },
            { sr: 3, zone: "WR", div: "ADI", cat: "ROUTER", tier: "Non-Tier 1", node: "RNO", profile: "CISCO 1841", install: "2024-02-27", eol: "2030-02-20", age: "8" },
            { sr: 4, zone: "CR", div: "MUM", cat: "SWITCH", tier: "Non-Tier 1", node: "GSFCBJ-W", profile: "CISCO 2921", install: "2024-05-02", eol: "2032-05-01", age: "6" },
            { sr: 5, zone: "WR", div: "BRC", cat: "ROUTER", tier: "Non-Tier 1", node: "GNFCBH", profile: "CISCO 2921", install: "2023-10-13", eol: "2031-10-12", age: "8" },
            { sr: 6, zone: "NR", div: "DEL", cat: "ROUTER", tier: "Tier 3", node: "KWS-FOIS", profile: "CISCO ISR4431", install: "2022-10-23", eol: "2030-03-22", age: "8" }
        ];

        let activeFilters = { zone: [], div: [], cat: [], tier: [], profile: [], age: [] };
        let dateFilters = {
            install: { start: '', end: '' },
            eol: { start: '', end: '' }
        };

        function initFilters() {
            // Initialize Standard Multi-Select Filters
            Object.keys(activeFilters).forEach(key => {
                const uniqueValues = [...new Set(fullExcelData.map(item => item[key]))].sort();
                activeFilters[key] = [...uniqueValues];
                const dropdown = document.getElementById(`filter-${key}`);
                
                let html = `<div class="flex justify-between items-center p-2 border-b mb-2 bg-slate-50 rounded-lg">
                    <div class="flex space-x-2">
                        <span class="cursor-pointer text-indigo-600 text-[9px] font-bold" onclick="selectAll('${key}', true)">ALL</span>
                        <span class="cursor-pointer text-rose-600 text-[9px] font-bold" onclick="selectAll('${key}', false)">CLEAR</span>
                    </div>
                    <i class="fa-solid fa-circle-xmark text-slate-300 cursor-pointer" onclick="closeAllFilters()"></i>
                </div>`;
                
                uniqueValues.forEach(val => {
                    html += `<label class="checkbox-item flex items-center p-2 rounded cursor-pointer text-[10px]">
                        <input type="checkbox" checked class="mr-2 filter-check-${key}" value="${val}" onchange="updateFilterState('${key}')"> ${val}
                    </label>`;
                });
                dropdown.innerHTML = html;
            });

            // Initialize Date Range Filters
            ['install', 'eol'].forEach(key => {
                const dropdown = document.getElementById(`filter-${key}`);
                dropdown.innerHTML = `
                    <div class="p-2 border-b mb-2 bg-slate-50 rounded-lg flex justify-between items-center">
                        <span class="text-[9px] font-black uppercase text-slate-400">Date Range</span>
                        <i class="fa-solid fa-circle-xmark text-slate-300 cursor-pointer" onclick="closeAllFilters()"></i>
                    </div>
                    <div class="space-y-3 p-1">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase">From</label>
                            <input type="date" id="${key}-start" onchange="updateDateFilter('${key}')">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase">To</label>
                            <input type="date" id="${key}-end" onchange="updateDateFilter('${key}')">
                        </div>
                        <button onclick="resetDateFilter('${key}')" class="w-full mt-2 text-[9px] py-1 bg-slate-100 rounded text-slate-500 font-bold hover:bg-slate-200">RESET DATES</button>
                    </div>
                `;
            });
        }

        function toggleFilter(e, key) {
            e.stopPropagation();
            const dropdown = document.getElementById(`filter-${key}`);
            const isActive = dropdown.classList.contains('active');
            closeAllFilters();
            if (!isActive) dropdown.classList.add('active');
        }

        function closeAllFilters() {
            document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('active'));
        }

        function selectAll(key, bool) {
            document.querySelectorAll(`.filter-check-${key}`).forEach(cb => cb.checked = bool);
            updateFilterState(key);
        }

        function updateFilterState(key) {
            activeFilters[key] = Array.from(document.querySelectorAll(`.filter-check-${key}:checked`)).map(cb => cb.value);
            applyAllFilters();
        }

        function updateDateFilter(key) {
            dateFilters[key].start = document.getElementById(`${key}-start`).value;
            dateFilters[key].end = document.getElementById(`${key}-end`).value;
            applyAllFilters();
        }

        function resetDateFilter(key) {
            document.getElementById(`${key}-start`).value = '';
            document.getElementById(`${key}-end`).value = '';
            dateFilters[key] = { start: '', end: '' };
            applyAllFilters();
        }

        function applyAllFilters() {
            const globalQuery = document.getElementById('globalSearch').value.toLowerCase();
            
            const filteredData = fullExcelData.filter(item => {
                const matchesGlobal = Object.values(item).some(val => String(val).toLowerCase().includes(globalQuery));
                
                // Check Date Ranges
                const checkDate = (field) => {
                    const val = item[field];
                    const start = dateFilters[field].start;
                    const end = dateFilters[field].end;
                    if (!start && !end) return true;
                    if (start && val < start) return false;
                    if (end && val > end) return false;
                    return true;
                };

                return matchesGlobal && 
                       activeFilters.zone.includes(item.zone) &&
                       activeFilters.div.includes(item.div) &&
                       activeFilters.cat.includes(item.cat) &&
                       activeFilters.tier.includes(item.tier) &&
                       activeFilters.profile.includes(item.profile) &&
                       activeFilters.age.includes(item.age) &&
                       checkDate('install') &&
                       checkDate('eol');
            });

            renderTable(filteredData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('foisTableBody');
            tbody.innerHTML = data.length ? '' : '<tr><td colspan="10" class="p-10 text-center italic text-slate-400">No records matching selected criteria.</td></tr>';
            
            data.forEach(item => {
                const tierClass = item.tier.includes('Tier 3') ? 'bg-amber-100 text-amber-700' : 'bg-cyan-100 text-cyan-700';
                tbody.innerHTML += `
                    <tr class="hover:bg-indigo-50/30 transition-colors">
                        <td class="p-4 text-center font-mono opacity-50">${item.sr}</td>
                        <td class="p-4 font-bold text-slate-800">${item.zone}</td>
                        <td class="p-4">${item.div}</td>
                        <td class="p-4 text-indigo-600 font-bold text-[9px] uppercase"><i class="fa-solid fa-server mr-1"></i>${item.cat}</td>
                        <td class="p-4"><span class="${tierClass} px-2 py-0.5 rounded text-[9px] font-bold">${item.tier}</span></td>
                        <td class="p-4 font-black text-slate-900 bg-indigo-50/30">${item.node}</td>
                        <td class="p-4 text-slate-500 font-semibold">${item.profile}</td>
                        <td class="p-4 font-mono text-slate-500">${item.install}</td>
                        <td class="p-4 font-mono text-rose-600 font-bold">${item.eol}</td>
                        <td class="p-4 text-center"><span class="bg-indigo-600 text-white px-2 py-1 rounded-full text-[9px] font-bold">${item.age}Y</span></td>
                    </tr>`;
            });
        }

        initFilters();
        applyAllFilters();
    </script>
</body>
</html>
