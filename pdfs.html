<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PDF Documents | NOCC ROOT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a535b",
                        "background-dark": "#1a1e23",
                        "surface-dark": "#24292f",
                        "accent-gold": "#C8AA6E",
                        "accent-red": "#D85B42",
                        "accent-green": "#078834"
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Manrope', sans-serif; background-color: #1a1e23; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1e23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a535b; border-radius: 10px; }
    </style>
</head>
<body class="bg-background-dark text-[#e9f0f1] font-display selection:bg-primary/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PdfManager = () => {
            const [pdfs, setPdfs] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newPdf, setNewPdf] = useState({ name: '', fileUrl: '' });
            const [editingPdf, setEditingPdf] = useState(null);
            const [userRole, setUserRole] = useState('');

            useEffect(() => {
                const user = JSON.parse(localStorage.getItem('noccroot_user') || '{}');
                setUserRole(user.role || '');

                async function loadPdfs() {
                    try {
                        const token = localStorage.getItem('noccroot_token');
                        const res = await fetch('/api/pdfs', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const json = await res.json();
                        if (res.ok) setPdfs(json.pdfs);
                    } catch (err) {
                        console.error('Could not load PDFs', err);
                    }
                }
                loadPdfs();
            }, []);

            const handleAddPdf = async (e) => {
                e.preventDefault();
                try {
                    const token = localStorage.getItem('noccroot_token');
                    const res = await fetch('/api/pdfs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify(newPdf)
                    });
                    const json = await res.json();
                    if (!res.ok) throw new Error(json.error);
                    setPdfs(prev => [json.pdf, ...prev]);
                    setIsModalOpen(false);
                    setNewPdf({ name: '', fileUrl: '' });
                } catch (err) {
                    alert('Failed to add PDF: ' + err.message);
                }
            };

            const handleEditPdf = async (e) => {
                e.preventDefault();
                try {
                    const token = localStorage.getItem('noccroot_token');
                    const res = await fetch(`/api/pdfs?id=${editingPdf.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ name: editingPdf.name })
                    });
                    if (!res.ok) throw new Error('Update failed');
                    setPdfs(prev => prev.map(p => p.id === editingPdf.id ? { ...p, name: editingPdf.name } : p));
                    setEditingPdf(null);
                } catch (err) {
                    alert('Failed to update PDF: ' + err.message);
                }
            };

            const handleDeletePdf = async (id) => {
                if (!confirm('Delete this PDF?')) return;
                try {
                    const token = localStorage.getItem('noccroot_token');
                    const res = await fetch(`/api/pdfs?id=${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!res.ok) throw new Error('Delete failed');
                    setPdfs(prev => prev.filter(p => p.id !== id));
                } catch (err) {
                    alert('Failed to delete PDF: ' + err.message);
                }
            };

            const canDownload = ['admin', 'super_admin', 'root'].includes(userRole);
            const canAdd = ['admin', 'super_admin', 'root'].includes(userRole);
            const canEdit = ['admin', 'super_admin', 'root'].includes(userRole);
            const canDelete = ['super_admin'].includes(userRole);

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 flex-shrink-0 border-r border-[#2b313a] flex flex-col bg-background-dark">
                        <div className="p-6">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                                    <span className="material-symbols-outlined">description</span>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold leading-tight">PDF Manager</h1>
                                    <p className="text-xs text-[#5a868c]">Document Control</p>
                                </div>
                            </div>
                            <nav className="space-y-1">
                                <a href="user.html" className="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#5a868c] hover:bg-[#2b313a]">
                                    <span className="material-symbols-outlined text-sm">arrow_back</span>
                                    <span className="text-sm">Back to Dashboard</span>
                                </a>
                            </nav>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col overflow-hidden bg-background-dark">
                        <header className="h-16 border-b border-[#2b313a] flex items-center justify-between px-8 bg-background-dark">
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium text-[#5a868c]">Path:</span>
                                <div className="text-xs font-mono bg-[#2b313a] px-3 py-1 rounded border border-[#3a414b]">
                                    documents <span className="mx-2 opacity-50">/</span> pdfs
                                </div>
                            </div>
                            {canAdd && (
                                <button onClick={() => setIsModalOpen(true)} className="bg-primary text-white px-4 py-2 rounded-lg text-sm font-bold">
                                    <i className="fa-solid fa-plus mr-2"></i>Add PDF
                                </button>
                            )}
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {pdfs.map(pdf => (
                                    <div key={pdf.id} className="bg-surface-dark rounded-xl border border-[#3a414b] p-6">
                                        <div className="flex items-center gap-3 mb-4">
                                            <i className="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
                                            <div className="flex-1">
                                                <h3 className="font-bold text-white">{pdf.name}</h3>
                                                <p className="text-xs text-[#5a868c]">by {pdf.uploadedBy.fullName}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => window.open(pdf.fileUrl, '_blank')} className="flex-1 bg-blue-600 text-white py-2 rounded text-sm font-bold">
                                                <i className="fa-solid fa-eye mr-1"></i>View
                                            </button>
                                            {canDownload && (
                                                <a href={pdf.fileUrl} download className="bg-green-600 text-white px-3 py-2 rounded text-sm font-bold">
                                                    <i className="fa-solid fa-download"></i>
                                                </a>
                                            )}
                                            {canEdit && (
                                                <button onClick={() => setEditingPdf(pdf)} className="bg-yellow-600 text-white px-3 py-2 rounded text-sm font-bold">
                                                    <i className="fa-solid fa-edit"></i>
                                                </button>
                                            )}
                                            {canDelete && (
                                                <button onClick={() => handleDeletePdf(pdf.id)} className="bg-red-600 text-white px-3 py-2 rounded text-sm font-bold">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* Add PDF Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
                            <div className="bg-surface-dark p-6 rounded-xl w-full max-w-md">
                                <h2 className="text-xl font-bold mb-4">Add New PDF</h2>
                                <form onSubmit={handleAddPdf}>
                                    <input required placeholder="PDF Name" className="w-full mb-4 p-3 bg-[#1a1e23] border border-[#3a414b] rounded" value={newPdf.name} onChange={e => setNewPdf({...newPdf, name: e.target.value})} />
                                    <input required type="url" placeholder="File URL" className="w-full mb-4 p-3 bg-[#1a1e23] border border-[#3a414b] rounded" value={newPdf.fileUrl} onChange={e => setNewPdf({...newPdf, fileUrl: e.target.value})} />
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 bg-primary text-white py-2 rounded font-bold">Add</button>
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-gray-600 text-white py-2 rounded">Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Edit PDF Modal */}
                    {editingPdf && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
                            <div className="bg-surface-dark p-6 rounded-xl w-full max-w-md">
                                <h2 className="text-xl font-bold mb-4">Edit PDF Name</h2>
                                <form onSubmit={handleEditPdf}>
                                    <input required placeholder="PDF Name" className="w-full mb-4 p-3 bg-[#1a1e23] border border-[#3a414b] rounded" value={editingPdf.name} onChange={e => setEditingPdf({...editingPdf, name: e.target.value})} />
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 bg-primary text-white py-2 rounded font-bold">Update</button>
                                        <button type="button" onClick={() => setEditingPdf(null)} className="flex-1 bg-gray-600 text-white py-2 rounded">Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PdfManager />);
    </script>
</body>
</html>
