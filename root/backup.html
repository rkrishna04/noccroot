<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>System Backup | System Root</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.materialdesignicons.com/2.0.46/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a535b",
                        "background-light": "#fcfdfc",
                        "background-dark": "#1a1e23",
                        "surface-dark": "#24292f",
                        "accent-gold": "#C8AA6E",
                        "accent-red": "#D85B42",
                        "accent-green": "#078834"
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Manrope', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1e23; }
        ::-webkit-scrollbar-thumb { background: #1a535b; border-radius: 10px; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-[#101819] dark:text-[#e9f0f1] font-display selection:bg-primary/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const BackupManager = () => {
            const [isProcessing, setIsProcessing] = useState(false);
            const [lastSize, setLastSize] = useState("0 Bytes");
            const [backupHistory, setBackupHistory] = useState([
                { id: 1, name: "SYSTEM_RECOVERY_INIT.json", size: "4.2 KB", date: "2026-03-05 10:30", status: "Stored" }
            ]);

            // Utility to format bytes into readable sizes
            const formatBytes = (bytes, decimals = 2) => {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            };

            const runBackupWorkflow = () => {
                setIsProcessing(true);

                // 1. Simulate complex data gathering from your NOCC ROOT environment
                const simulatedDatabase = {
                    system_info: { version: "4.2.0", node: "WR-VADODARA-01" },
                    timestamp: new Date().toISOString(),
                    assets: [
                        { id: "STN_001", name: "Vadodara Jn", status: "Operational" },
                        { id: "STN_002", name: "Ahmedabad", status: "Maintenance" }
                    ],
                    security_logs: [
                        { event: "Root Login", user: "Krishnakumar_Root", ip: "192.168.1.1" }
                    ]
                };

                // 2. Processing delay to simulate serialization
                setTimeout(() => {
                    const dataString = JSON.stringify(simulatedDatabase, null, 4);
                    
                    // 3. CREATE BLOB AND CALCULATE TRUE SIZE
                    const blob = new Blob([dataString], { type: 'application/json' });
                    const trueSize = formatBytes(blob.size);
                    setLastSize(trueSize);

                    // 4. TRIGGER BROWSER DOWNLOAD
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `NOCC_ROOT_BACKUP_${Date.now()}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    // 5. Update UI History
                    const newLog = {
                        id: Date.now(),
                        name: link.download,
                        size: trueSize,
                        date: new Date().toLocaleString(),
                        status: "Success"
                    };
                    setBackupHistory([newLog, ...backupHistory]);
                    setIsProcessing(false);
                }, 1800);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* --- SIDE NAVIGATION --- */}
                    <aside className="w-64 flex-shrink-0 border-r border-[#d3e1e3] dark:border-[#2b313a] flex flex-col bg-background-light dark:bg-background-dark">
                        <div className="p-6">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                                    <span className="material-symbols-outlined">terminal</span>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold leading-tight">System Root</h1>
                                    <p className="text-xs text-[#5a868c]">v4.2.0-stable</p>
                                </div>
                            </div>
                            <nav className="space-y-1">
                                <a href="root.html" className="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#5a868c] hover:bg-[#e9f0f1] dark:hover:bg-[#2b313a]">
                                    <span className="material-symbols-outlined text-sm">dashboard</span>
                                    <span className="text-sm">Overview</span>
                                </a>
                                <a href="#" className="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary dark:text-[#e9f0f1] font-semibold border-l-4 border-primary">
                                    <span className="material-symbols-outlined text-sm">database</span>
                                    <span className="text-sm">System Backup</span>
                                </a>
                                <a href="sa.html" className="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#5a868c] hover:bg-[#e9f0f1] dark:hover:bg-[#2b313a]">
                                    <span className="material-symbols-outlined text-sm">shield_person</span>
                                    <span className="text-sm">SA Management</span>
                                </a>
                            </nav>
                        </div>
                    </aside>

                    {/* --- MAIN CONTENT --- */}
                    <main className="flex-1 flex flex-col bg-[#f9fbfb] dark:bg-background-dark overflow-hidden">
                        <header className="h-16 border-b border-[#d3e1e3] dark:border-[#2b313a] flex items-center justify-between px-8 bg-background-light dark:bg-background-dark">
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium text-[#5a868c]">Path:</span>
                                <div className="text-xs font-mono bg-[#e9f0f1] dark:bg-[#2b313a] px-3 py-1 rounded border border-[#d3e1e3] dark:border-[#3a414b]">
                                    root <span className="mx-2 opacity-50">/</span> system <span className="mx-2 opacity-50">/</span> backup-engine
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-6">
                            {/* Action Card */}
                            <section className="bg-background-light dark:bg-surface-dark rounded-2xl border border-[#d3e1e3] dark:border-[#3a414b] p-8 shadow-sm">
                                <div className="flex justify-between items-start mb-8">
                                    <div>
                                        <h2 className="text-2xl font-bold tracking-tight">Data Extraction Engine</h2>
                                        <p className="text-[#5a868c] mt-1">Generate a physical JSON snapshot of the current system state for offline storage.</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] uppercase font-bold text-[#5a868c] mb-1">Last Export Size</p>
                                        <p className="text-xl font-mono font-bold text-primary">{lastSize}</p>
                                    </div>
                                </div>

                                <div className="bg-[#e9f0f1] dark:bg-background-dark/50 rounded-xl p-6 border border-dashed border-[#d3e1e3] dark:border-[#3a414b] mb-6">
                                    <div className="flex items-center gap-4">
                                        <div className={`size-12 rounded-full flex items-center justify-center ${isProcessing ? 'animate-spin bg-accent-gold/20 text-accent-gold' : 'bg-primary/10 text-primary'}`}>
                                            <span className="material-symbols-outlined">{isProcessing ? 'sync' : 'database_upload'}</span>
                                        </div>
                                        <div>
                                            <h3 className="font-bold">Ready for Local Write</h3>
                                            <p className="text-xs text-[#5a868c]">The system will compile all station assets, users, and logs into a single file.</p>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={runBackupWorkflow}
                                    disabled={isProcessing}
                                    className="w-full py-4 bg-primary text-white rounded-xl font-bold uppercase tracking-widest text-sm shadow-xl shadow-primary/20 hover:scale-[1.005] active:scale-[0.99] transition-all disabled:opacity-50 flex items-center justify-center gap-3"
                                >
                                    <span className="material-symbols-outlined text-xl">download</span>
                                    {isProcessing ? 'Analyzing Database Footprint...' : 'Run & Download Manual Backup'}
                                </button>
                            </section>

                            {/* History Table */}
                            <section className="bg-background-light dark:bg-surface-dark rounded-2xl border border-[#d3e1e3] dark:border-[#3a414b] overflow-hidden shadow-sm">
                                <div className="px-6 py-4 border-b border-[#d3e1e3] dark:border-[#3a414b] bg-[#fcfdfc] dark:bg-[#2b313a]/50">
                                    <h2 className="text-xs font-bold uppercase tracking-widest text-[#5a868c]">Extraction Audit Trail</h2>
                                </div>
                                <table className="w-full text-left">
                                    <thead className="bg-[#e9f0f1]/30 dark:bg-[#1a1e23]/30 text-[#5a868c] text-[10px] uppercase font-bold">
                                        <tr>
                                            <th className="px-6 py-4">Filename</th>
                                            <th className="px-6 py-4">True Size</th>
                                            <th className="px-6 py-4">Date & Time</th>
                                            <th className="px-6 py-4 text-right">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-[#d3e1e3] dark:divide-[#3a414b]">
                                        {backupHistory.map(log => (
                                            <tr key={log.id} className="hover:bg-primary/5 transition-colors group">
                                                <td className="px-6 py-4 font-mono text-xs font-bold">{log.name}</td>
                                                <td className="px-6 py-4 font-bold text-primary">{log.size}</td>
                                                <td className="px-6 py-4 text-xs text-[#5a868c]">{log.date}</td>
                                                <td className="px-6 py-4 text-right">
                                                    <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-accent-green/10 text-accent-green text-[10px] font-bold uppercase">
                                                        <span className="size-1.5 rounded-full bg-accent-green animate-pulse"></span>
                                                        {log.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </section>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BackupManager />);
    </script>
</body>
</html>
